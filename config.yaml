chunk_size: 512
chunk_overlap: 120
chunking_strategy: recursive
top_k: 3
index_path: ./vectorstore/faiss_index_512
profiles:
  general:
    chunk_size: 800
    chunk_overlap: 120
    chunking_strategy: recursive
  legal:
    chunk_size: 1500
    chunk_overlap: 300
    chunking_strategy: recursive
  medical:
    chunk_size: 1000
    chunk_overlap: 200
    chunking_strategy: semantic
  faq:
    chunk_size: 400
    chunk_overlap: 50
    chunking_strategy: sentence
embedding:
  mode: auto
  batch_size: 32
  normalize_embeddings: true
  models:
    - name: "sentence-transformers/all-MiniLM-L6-v2"
      source: local
      dim: 384
    - name: "BAAI/bge-small-en-v1.5"
      source: local
      dim: 384
    - name: "BAAI/bge-base-en-v1.5"
      source: local
      dim: 768
    - name: "text-embedding-3-small"
      source: openai
      dim: 1536
      cost_per_1k_tokens: 0.00002
    - name: "text-embedding-3-large"
      source: openai
      dim: 3072
      cost_per_1k_tokens: 0.00013

  finetuned_models:
    - name: "./finetuned/bge-small-en-v1-5-finetuned"
      source: local
      base_model: "BAAI/bge-small-en-v1.5"
      dim: 384
    - name: "./finetuned/bge-base-en-v1-5-finetuned"
      source: local
      base_model: "BAAI/bge-base-en-v1.5"
      dim: 768
    - name: "./finetuned/all-minilm-l6-v2-finetuned"
      source: local
      base_model: "sentence-transformers/all-MiniLM-L6-v2"
      dim: 384

device: mps          # mps | cuda | cpu — auto-detected at runtime
incremental:
  enabled: true
  tracker_path: ./vectorstore/document_tracker.json
slo:
  e2e_p95_ms: 5000
  retriever_p95_ms: 500
  llm_p95_ms: 4000
eval:
  chunk_sizes_to_test:
  - 128
  - 256
  - 512
  - 1024
  top_k_configs_for_generation: 2
  phase1_ranking_metric: hit_rate
  cache_responses: true
  cache_dir: eval/cache/
  results_dir: eval/results/
lancedb:
  db_path: ./vectorstore/lancedb
  table_name: fleet_chunks

training:
  queries_per_chunk: 3
  coverage_ratio: 0.6
  eval_split: 0.15
  hard_negative_tiers:
    very_hard_threshold: 0.75
    hard_threshold: 0.55
    medium_threshold: 0.35
  false_negative_threshold: 0.92
  epochs: 3
  batch_size: 16
  learning_rate: 2.0e-5
  warmup_ratio: 0.1
